name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    name: test suite (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install pyyaml (workflow-YAML validity checks)
        run: python3 -m pip install pyyaml
      - name: Run tests/run.sh
        run: bash tests/run.sh

  shellcheck:
    name: shellcheck (errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck --severity=error
        run: shellcheck --severity=error redeploy tests/run.sh tests/mocks/* install.sh
